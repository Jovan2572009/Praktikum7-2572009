<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PokemonHome - 2572009</title>
    <meta name="viewport" content="width=device-width, initialscale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- NAVBAR -->
    <nav class="navbar-expand-lg navbar-dark bg-danger">
        <div class="container d-flex justify-content-between">
            <a class="navbar-brand fw-bold">Pokémon Home</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
            </button>
           
                <div class="collapse navbar-collapse" id = "navbarNav">
                    <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                        <li class="nav-item"><a class="nav-link active me-2" aria-current="page" href="#">Beranda</a></li>
                        <li class="nav-item"><a class="nav-link me-2"  href="#">Pokédex</a></li>
                        <li class="nav-item"><a class="nav-link me-2"  href="#">Types</a></li>
                        <li class="nav-item"><a class="nav-link me-2" href="#">Favorites</a></li>    
                    </ul>
                   <button class="btn btn-danger">Daftar</button>
                </div>
            
        </div>
    </nav>
 <!-- CAROUSEL -->
    <div id="carousel" class="carousel text-center">
        <div class="carousel-inner">
        <div class="carousel-item active">
            <img src="pokemon.jpg" alt="Pokemon Image 1" class="...">
        </div>
        <div class="carousel-item">
            <img src="pokemon1.jpg" alt="Pokemon Image 1" class="...">
        </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carousel" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>
    </div>
 <!-- CONTENT -->
    <div class="container my-5">
        <h3 class="fw-bold mb-4">Explore Pokémon</h3>
 <!-- CARD -->
        <div class="text-center g4 row">
            <div class="col-md-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Pokédex</h5>
                        <p class="card-text">Lihat semua Pokémon</p>
                        <button class="btn btn-danger">Explore</button>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Types</h5>
                        <p class="card-text">Kenali tipe Pokémon</p>
                        <button class="btn btn-danger">View</button>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Favorites</h5>
                        <p class="card-text">Pokémon favorit</p>
                        <button class="btn btn-danger">See More</button>
                    </div>
                </div>
            </div>
        </div>
    
 <!-- POKEMON -->
        <h3 class="fw-bold mb-4 mt-5">Popular Pokémon</h3>
        <div class="row g-4">   
            <div class="col-md-3">
                <div class="card text-center shadow-ms">
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/25.png" class="card-img-top p-3">
                        <div class="card-body">
                            <h5 class="card-title">Pikachu</h5>
                            <span class="badge bg-warning text-dark">Electric</span>
                        </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center shadow-ms">
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/6.png" class="card-img-top p-3">
                    <div class="card-body">
                        <h5 class="card-title">Charizard</h5>
                        <span class="badge bg-danger">Fire</span>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center shadow-ms">
                    <img src="9.png" alt = "" class="card-img-top p-3">
                    <div class="card-body">
                        <h5 class="card-title">Blastoise</h5>
                        <span class="badge bg-primary">Water</span>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center shadow-ms">
                    <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/3.png" class="card-img-top p-3">
                    <div class="card-body">
                        <h5 class="card-title">Venusaur</h5>
                        <span class="badge bg-success">Grass</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
 <!-- FOOTER -->
    <footer class="bg-dark text-white text-center py-3">
        <p class="mb-0">&copy; 2026 2572009 Jovan. All rights reserved.</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
